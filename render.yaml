services:
  - type: web
    name: ai-shadow
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn --bind 0.0.0.0:$PORT --workers 2 --timeout 120 main:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: RENDER
        value: trueservices:
  - type: web
    name: ai-shadow
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn --bind 0.0.0.0:$PORT --workers 2 --timeout 120 main:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: RENDER
        value: true

      # Existing secrets (set values in dashboard/Render, not in repo)
      - key: GROQ_API_KEY
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: TARGET_CHANNEL_ID
        sync: false

      # New (optional) reporting config; safe defaults already exist in code
      - key: INSIGHTS_DB_PATH
        value: /var/data/insights.db
      - key: REPORT_POST_CHANNEL_ID
        value: ""            # empty = fall back to TARGET_CHANNEL_ID
      - key: REPORT_INCLUDE_FACTS
        value: "true"
      - key: REPORT_MAX_ITEMS
        value: "50"

    # Persist SQLite data across deploys
    disk:
      name: insights-disk
      mountPath: /var/data
      sizeGB: 1