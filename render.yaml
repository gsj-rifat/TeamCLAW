services:
  - type: web
    name: ai-shadow
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn --bind 0.0.0.0:$PORT --workers 2 --timeout 120 main:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: RENDER
        value: true
      - key: DASHBOARD_TOKENS
        value: '{"viewer-token":"viewer","user-token":"user","admin-token":"admin"}'

      # Secrets (set in Render dashboard)
      - key: GROQ_API_KEY
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: TARGET_CHANNEL_ID
        sync: false
      - key: DASHBOARD_VIEWER_TOKENS
        value: "viewer-abc123,viewer-xyz789"
      - key: DASHBOARD_USER_TOKENS
        value: "user-abc123,user-xyz789"
      - key: DASHBOARD_ADMIN_TOKENS
        value: "admin-secret-1,admin-secret-2"

      # Reporting config (DB on persistent disk)
      - key: INSIGHTS_DB_PATH
        value: /var/data/insights.db
      - key: REPORT_POST_CHANNEL_ID
        value: ""             # fallback to TARGET_CHANNEL_ID if empty
      - key: REPORT_INCLUDE_FACTS
        value: "true"
      - key: REPORT_MAX_ITEMS
        value: "50"

    disk:
      name: insights-disk
      mountPath: /var/data
      sizeGB: 1